services:
  backend:
    build:
      context: ./backend
    container_name: sales-insight-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    container_name: sales-insight-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
